<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot Chatbot</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .chat-container { width: 450px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .chat-header { background: #4CAF50; color: white; padding: 15px; text-align: center; font-size: 1.2em; font-weight: bold; }
        .chat-box { height: 400px; padding: 15px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 14px; border-radius: 8px; max-width: 75%; word-wrap: break-word; }
        .user-msg { background: #DCF8C6; align-self: flex-end; color: #333; }
        .bot-msg { background: #EAEAEA; align-self: flex-start; color: #333; }
        .input-area { display: flex; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 15px; border: none; outline: none; font-size: 1em; }
        .input-area button { background: #4CAF50; color: white; border: none; padding: 0 20px; cursor: pointer; font-size: 1em; }
        .input-area button:hover { background: #45a049; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">AI Assistant ChatBot</div>
    <div class="chat-box" id="chatBox">
        <div class="message bot-msg">Hello! I am your backend-driven assistant. Ask me anything!</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputEl = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const text = inputEl.value.trim();
        
        if (!text) return;

        // 1. Append User Message to UI
        appendMessage(text, 'user-msg');
        inputEl.value = '';

        try {
            // 2. Fetch API call to Spring Boot Backend
            const response = await fetch('http://localhost:8080/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            
            const data = await response.json();
            
            // 3. Append Bot Response to UI
            appendMessage(data.message, 'bot-msg');
        } catch (error) {
            appendMessage("Error connecting to server. Is the backend running?", 'bot-msg');
        }
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>
</body>
</html>
